<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4CAF50;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #45a049;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            color: #4CAF50;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>제휴 문의</h1>
    <p class="subtitle">제휴 관련 문의사항을 남겨주시면 검토 후 연락드리겠습니다.</p>

    <form id="contact-form" action="https://formspree.io/f/mpqygnzq" method="POST">
        <label for="name">이름 / 회사명</label>
        <input type="text" id="name" name="name" placeholder="홍길동 / (주)회사명" required>

        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>

        <label for="type">문의 유형</label>
        <select id="type" name="type" required>
            <option value="" disabled selected>선택해주세요</option>
            <option value="광고/마케팅 제휴">광고 / 마케팅 제휴</option>
            <option value="콘텐츠 제휴">콘텐츠 제휴</option>
            <option value="기술 협력">기술 협력</option>
            <option value="기타">기타</option>
        </select>

        <label for="message">문의 내용</label>
        <textarea id="message" name="message" placeholder="제휴 관련 내용을 자유롭게 작성해주세요." required></textarea>

        <button type="submit">문의 보내기</button>
    </form>

    <div class="success-message" id="success-message">
        문의가 접수되었습니다. 빠른 시일 내에 연락드리겠습니다.
    </div>
</div>

<script>
    const form = document.getElementById('contact-form');
    const successMessage = document.getElementById('success-message');

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const data = new FormData(form);

        const response = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            form.style.display = 'none';
            successMessage.style.display = 'block';
        } else {
            alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        }
    });
</script>

</body>
</html>
